<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">AT1 logo</title>
  <desc id="desc">Round white AT logo with red a, blue t, and the slogan life is simple.</desc>
  <circle cx="80" cy="80" r="78" fill="#ffffff"/>
  <text x="30" y="94" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="92" font-weight="900" fill="#ef1c24">a</text>
  <text x="83" y="87" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#1f4a97">t</text>
  <text x="80" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic" fill="#111111">life is simple</text>
</svg>
